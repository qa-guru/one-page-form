<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Box</title>
    <style>
      :root {
        --bg: #efefef;
        --text: #222;
        --muted: #6b6b6b;
        --line: #cfcfcf;
        --input-bg: #f4f4f4;
        --button: #1677f2;
        --color-bg: #f5f0e8;
        --color-surface: #2c2a26;
        --color-text-inverse: #f5f0e8;
        --color-primary: #20aee3;
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-6: 24px;
        --radius-sm: 8px;
        --duration-fast: 120ms;
        --duration-normal: 200ms;
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--color-bg);
        color: var(--text);
      }

      .site-shell {
        width: min(1300px, calc(100% - 32px));
        margin: 0 auto;
      }

      .header {
        background-color: var(--color-surface);
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        width: 100%;
        z-index: 100;
        height: 56px;
        padding: 0 var(--space-4);
        border-bottom: 1px solid rgba(245, 240, 232, 0.08);
      }

      .header-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1300px;
        margin: 0 auto;
        width: 100%;
        position: relative;
        height: 100%;
      }

      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        align-self: stretch;
        text-decoration: none;
        transition: opacity var(--duration-normal) var(--ease-out);
        z-index: 102;
      }

      .logo:hover {
        opacity: 0.9;
      }

      .default-logo {
        display: block;
        height: 22px;
        width: auto;
        max-width: 130px;
        object-fit: contain;
        transform: translateY(3px);
      }

      .logo:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 4px;
        border-radius: var(--radius-sm);
      }

      .nav {
        display: flex;
        align-items: center;
        gap: var(--space-2);
      }

      .nav-external {
        display: flex;
        align-items: center;
        gap: var(--space-1);
        margin-left: var(--space-6);
        padding-left: var(--space-4);
        border-left: 1px solid rgba(245, 240, 232, 0.2);
      }

      .nav-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        color: var(--color-text-inverse);
        background: transparent;
        border-radius: var(--radius-sm);
        transition: color var(--duration-normal) var(--ease-out),
          background-color var(--duration-normal) var(--ease-out),
          opacity var(--duration-normal) var(--ease-out);
        opacity: 0.8;
      }

      .nav-icon:hover {
        color: var(--color-text-inverse);
        background-color: rgba(245, 240, 232, 0.1);
        opacity: 1;
      }

      .nav-icon:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }

      .nav-link {
        position: relative;
        text-decoration: none;
        color: var(--color-text-inverse);
        font-weight: 500;
        font-size: 0.95rem;
        white-space: nowrap;
        transition: color var(--duration-normal) var(--ease-out),
          background-color var(--duration-fast) var(--ease-out);
        padding: var(--space-2) var(--space-3);
        border-radius: var(--radius-sm);
      }

      .nav-link::after {
        content: "";
        position: absolute;
        bottom: var(--space-1);
        left: var(--space-3);
        right: var(--space-3);
        height: 2px;
        background-color: var(--color-primary);
        transform: scaleX(0);
        transition: transform var(--duration-normal) var(--ease-out);
        border-radius: 1px;
      }

      .nav-link:hover {
        color: var(--color-text-inverse);
        background-color: rgba(245, 240, 232, 0.06);
      }

      .nav-link:hover::after {
        transform: scaleX(1);
      }

      .nav-link:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }

      .burger-menu {
        display: none;
        cursor: pointer;
        width: 44px;
        height: 44px;
        position: absolute;
        top: 0;
        bottom: 0;
        right: 0;
        margin: auto 0;
        z-index: 102;
        background: transparent;
        border: none;
        padding: 0;
        border-radius: var(--radius-sm);
        transition: background var(--duration-fast) var(--ease-out);
      }

      .burger-menu:hover {
        background: rgba(245, 240, 232, 0.08);
      }

      .burger-menu:focus-visible {
        outline: 2px solid var(--color-primary);
        outline-offset: 2px;
      }

      .burger-line {
        width: 20px;
        height: 2px;
        background-color: var(--color-text-inverse);
        border-radius: 1px;
        transform-origin: center;
        transition: transform var(--duration-normal) var(--ease-out),
          opacity var(--duration-normal) var(--ease-out);
      }

      .burger-menu.active .burger-line-1 {
        transform: translateY(8px) rotate(45deg);
      }

      .burger-menu.active .burger-line-2 {
        opacity: 0;
      }

      .burger-menu.active .burger-line-3 {
        transform: translateY(-8px) rotate(-45deg);
      }

      .nav-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(44, 42, 38, 0.5);
        opacity: 0;
        visibility: hidden;
        transition: opacity var(--duration-normal) var(--ease-out), visibility var(--duration-normal);
        z-index: 100;
      }

      .nav-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .page {
        min-height: calc(100vh - 112px);
        display: grid;
        place-items: center;
        padding: 96px 24px 70px;
      }

      .card {
        width: min(760px, 100%);
        background: #ffffff;
        border: 1px solid #e3e9f5;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 14px 34px rgba(15, 23, 42, 0.1);
        position: relative;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 5px;
        border-radius: 16px 16px 0 0;
        background: linear-gradient(90deg, #20aee3, #2d5a4a);
      }

      h1 {
        margin: 0;
        text-align: center;
        font-size: clamp(1.4rem, 2.7vw, 2rem);
        letter-spacing: 0.2px;
      }

      .form-row {
        display: grid;
        grid-template-columns: 180px 1fr;
        align-items: start;
        gap: 14px 18px;
        margin-bottom: 14px;
      }

      label {
        padding-top: 10px;
        font-weight: 600;
        color: #1e293b;
        font-size: 1rem;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid #c4cfdf;
        border-radius: 10px;
        background: #f8fbff;
        color: #111827;
        font-size: 1.05rem;
        line-height: 1.4;
        padding: 12px 14px;
        outline: none;
      }

      input::placeholder,
      textarea::placeholder {
        color: #6b7280;
      }

      input {
        height: 50px;
      }

      textarea {
        min-height: 130px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: #335dff;
        box-shadow: 0 0 0 4px var(--focus);
        background: #ffffff;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 6px;
      }

      button {
        border: none;
        background: var(--button);
        color: #fff;
        border-radius: 10px;
        font-size: 1.05rem;
        font-weight: 600;
        padding: 12px 24px;
        cursor: pointer;
      }

      button:hover {
        background: #0e63d7;
      }

      #output {
        display: none;
        margin-top: 18px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        font-size: 0.98rem;
        background: #f8fbff;
      }

      #output.has-content {
        display: block;
      }

      #output p {
        margin: 0 0 8px;
      }

      #output p:last-child {
        margin-bottom: 0;
      }

      .site-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 100;
        border-top: 1px solid #d9e2f3;
        background: rgba(255, 255, 255, 0.95);
        padding: 14px 0;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 768px) {
        .nav {
          position: fixed;
          top: 56px;
          right: 0;
          width: min(320px, 88vw);
          height: calc(100vh - 56px);
          background-color: var(--color-surface);
          box-shadow: -20px 0 40px rgba(8, 7, 5, 0.35);
          flex-direction: column;
          align-items: stretch;
          padding: 20px 16px;
          transform: translateX(100%);
          transition: transform var(--duration-normal) var(--ease-out);
          z-index: 101;
        }

        .nav.active {
          transform: translateX(0);
        }

        .nav-link {
          width: 100%;
          font-size: 1rem;
        }

        .nav-external {
          margin-left: 0;
          padding-left: 0;
          border-left: none;
          border-top: 1px solid rgba(245, 240, 232, 0.2);
          padding-top: 14px;
          margin-top: 8px;
        }

        .burger-menu {
          display: inline-flex;
          flex-direction: column;
          justify-content: space-between;
          align-items: center;
          padding: 12px;
        }

        .page {
          padding: 80px 16px 70px;
          place-items: start center;
        }

        .card {
          padding: 22px 16px 18px;
        }

        .form-row {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        label {
          padding-top: 0;
        }

        .actions {
          margin-top: 8px;
        }

        #submit {
          width: 100%;
        }
      }

      /* Keep desktop-like 2-column layout to match reference screenshot. */
    </style>
  </head>

    <main class="page">
      <section class="card">
        <h1>Text Box</h1>

        <form id="userForm">
          <div class="form-row">
            <label for="userName">Full Name</label>
            <input id="userName" type="text" placeholder="Full Name" />
          </div>

          <div class="form-row">
            <label for="userEmail">Email</label>
            <input id="userEmail" type="email" placeholder="name@example.com" />
          </div>

          <div class="form-row">
            <label for="currentAddress">Current Address</label>
            <textarea id="currentAddress" placeholder="Current Address"></textarea>
          </div>

          <div class="form-row">
            <label for="permanentAddress">Permanent Address</label>
            <textarea id="permanentAddress"></textarea>
          </div>

          <div class="actions">
            <button id="submit" type="submit">Submit</button>
          </div>
        </form>

        <div id="output" aria-live="polite"></div>
      </section>
    </main>
    <footer class="site-footer">
      <div class="site-shell">
        <small>(c) QA.GURU 2019-2026</small>
      </div>
    </footer>

    <script>
      const form = document.getElementById("userForm");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const userNameValue = document.getElementById("userName").value.trim();
        const userEmailValue = document.getElementById("userEmail").value.trim();
        const currentAddressValue = document.getElementById("currentAddress").value.trim();
        const permanentAddressValue = document.getElementById("permanentAddress").value.trim();

        const output = document.getElementById("output");
        output.innerHTML = `
          <p id="name">Name:${userNameValue}</p>
          <p id="email">Email:${userEmailValue}</p>
          <p id="currentAddress">Current Address :${currentAddressValue}</p>
          <p id="permanentAddress">Permananet Address :${permanentAddressValue}</p>
        `;
        output.classList.add("has-content");
      });
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const burger = document.querySelector(".burger-menu");
        const nav = document.querySelector(".nav");
        const overlay = document.querySelector(".nav-overlay");
        const links = document.querySelectorAll(".nav-link");

        function closeMenu() {
          if (!burger || !nav || !overlay) return;
          burger.classList.remove("active");
          nav.classList.remove("active");
          overlay.classList.remove("active");
          burger.setAttribute("aria-expanded", "false");
        }

        if (burger && nav && overlay) {
          burger.addEventListener("click", () => {
            const isOpen = !burger.classList.contains("active");
            burger.classList.toggle("active", isOpen);
            nav.classList.toggle("active", isOpen);
            overlay.classList.toggle("active", isOpen);
            burger.setAttribute("aria-expanded", isOpen ? "true" : "false");
          });

          overlay.addEventListener("click", closeMenu);
        }

        links.forEach((link) => {
          link.addEventListener("click", closeMenu);
        });
      });
    </script>
